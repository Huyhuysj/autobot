version: 2.1
jobs:
  build:
    macos:
      xcode: 15.4.0
    steps:
      - checkout
      - run:
          name: Install Geode CLI
          command: |
            curl -L -o geode.tar.gz https://github.com/geode-sdk/cli/releases/download/v3.11.1/geode-v3.11.1-macos-arm64.tar.gz
            tar -xzf geode.tar.gz
            BIN_PATH=$(find . -name geode -type f | head -1)
            chmod +x "$BIN_PATH"
            sudo mv "$BIN_PATH" /usr/local/bin/geode
      - run:
          name: Build mod
          command: |
            geode build --platform ios
      - store_artifacts:
          path: build
          destination: artifacts
workflows:
  build_and_store:
    jobs:
      - build