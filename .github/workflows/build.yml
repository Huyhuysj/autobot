name: Build iOS Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod for iOS
        uses: geode-sdk/build-geode-mod@main
        with:
          platform: ios          # <--- BẮT BUỘC, đây là yếu tố bạn còn thiếu
          build-config: release
          export-pdb: false
          export-stripped: false

      - name: Upload .geode Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS
          path: ${{ github.workspace }}/*.geode
