name: Build iOS Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Geode CLI v3.7.4
        run: |
          CLI_URL="https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-mac.zip"
          echo "Downloading $CLI_URL"
          curl -L -o geode.zip "$CLI_URL"
          unzip -o geode.zip
          BIN=$(find . -name geode -type f | head -1)
          chmod +x "$BIN"
          sudo mv "$BIN" /usr/local/bin/geode
          geode --version

      - name: Setup and Install Geode SDK
        run: |
          # Create a dummy directory for GD path
          mkdir -p ~/dummy_gd
          
          # Create geode profile natively using the CLI
          geode profile add --name "default" --gd-path ~/dummy_gd
          echo "Profile created automatically via Geode CLI."
          
          # Install SDK
          MOD_VERSION=$(jq -r '.geode' mod.json)
          echo "Installing SDK version $MOD_VERSION"
          geode sdk install "$MOD_VERSION"
          echo "GEODE_SDK=$(geode sdk path)" >> $GITHUB_ENV

      - name: Build mod
        run: |
          geode build --platform ios --config release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS
          path: "*.geode"
