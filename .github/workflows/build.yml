name: Build iOS Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Geode CLI v3.7.4
        run: |
          CLI_URL="https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-mac.zip"
          echo "Downloading $CLI_URL"
          curl -L -o geode.zip "$CLI_URL"
          unzip -o geode.zip
          BIN=$(find . -name geode -type f | head -1)
          chmod +x "$BIN"
          sudo mv "$BIN" /usr/local/bin/geode
          geode --version

      - name: Setup Geode SDK manually
        run: |
          # Tải SDK 3.0.0 cho macOS từ release (định dạng .tar.gz)
          SDK_URL="https://github.com/geode-sdk/geode/releases/download/v3.0.0/geode-sdk-v3.0.0-mac.tar.gz"
          echo "Downloading SDK from $SDK_URL"
          curl -L -o geode-sdk.tar.gz "$SDK_URL"
          # Tạo thư mục SDK và giải nén
          mkdir -p $HOME/geode-sdk
          tar -xzf geode-sdk.tar.gz -C $HOME/geode-sdk
          # Đặt biến môi trường GEODE_SDK cho các bước sau
          echo "GEODE_SDK=$HOME/geode-sdk" >> $GITHUB_ENV
          echo "SDK installed at $HOME/geode-sdk"

      - name: Build mod
        run: |
          geode build --platform ios --config release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS
          path: "*.geode"
