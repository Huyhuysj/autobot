name: Build iOS Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Geode CLI v3.7.4
        run: |
          CLI_URL="https://github.com/geode-sdk/cli/releases/download/v3.7.4/geode-cli-v3.7.4-mac.zip"
          echo "Downloading $CLI_URL"
          curl -L -o geode.zip "$CLI_URL"
          unzip -o geode.zip
          BIN=$(find . -name geode -type f | head -1)
          chmod +x "$BIN"
          sudo mv "$BIN" /usr/local/bin/geode
          geode --version

      - name: Download Geode SDK 3.0.0 via GitHub API
        run: |
          # Lấy URL asset macOS (.zip) từ bản phát hành v3.0.0
          ASSET_URL=$(gh api repos/geode-sdk/geode/releases/tags/v3.0.0 --jq '.assets[] | select(.name | test("mac.*\\.zip$")) | .browser_download_url')
          echo "Downloading SDK from $ASSET_URL"
          curl -L -o geode-sdk.zip "$ASSET_URL"
          mkdir -p $HOME/geode-sdk
          unzip -o geode-sdk.zip -d $HOME/geode-sdk
          echo "GEODE_SDK=$HOME/geode-sdk" >> $GITHUB_ENV
          echo "SDK installed at $HOME/geode-sdk"

      - name: Build mod
        run: |
          geode build --platform ios --config release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS
          path: "*.geode"
