name: Build iOS Mod

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          ASSETS=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | jq -r '.assets[].name')
          echo "Available assets: $ASSETS"
          
          ASSET_URL=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest | jq -r '.assets[] | select(.name | test("mac.*\\.zip$")) | .browser_download_url' | head -1)
          
          if [ -z "$ASSET_URL" ]; then
            echo "ERROR: Không tìm thấy asset macOS .zip."
            exit 1
          fi
          
          echo "Downloading: $ASSET_URL"
          curl -L -o geode.zip "$ASSET_URL"
          unzip -o geode.zip
          BIN=$(find . -name geode -type f | head -1)
          chmod +x "$BIN"
          sudo mv "$BIN" /usr/local/bin/geode
          geode --version

      - name: Setup Geode SDK
        run: |
          MOD_VERSION=$(jq -r '.geode' mod.json)
          echo "Installing SDK version $MOD_VERSION"
          geode sdk install "$MOD_VERSION"
          echo "GEODE_SDK=$(geode sdk path)" >> $GITHUB_ENV

      - name: Build mod
        run: |
          geode build --platform ios --config release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS
          path: "*.geode"
