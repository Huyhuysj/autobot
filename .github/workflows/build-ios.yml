name: Build iOS Geode Mod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          # Lấy URL asset macos-arm64 từ release mới nhất (định dạng .tar.gz)
          ASSET_URL=$(curl -s https://api.github.com/repos/geode-sdk/cli/releases/latest \
            | jq -r '.assets[] | select(.name | test("macos-arm64")) | .browser_download_url')
          
          echo "Đang tải từ: $ASSET_URL"
          curl -L -o geode.tar.gz "$ASSET_URL"
          
          # Giải nén tar.gz – file thực thi tên "geode" có thể nằm ở gốc hoặc trong thư mục con
          tar -xzf geode.tar.gz
          BIN_PATH=$(find . -name geode -type f | head -1)
          echo "Tìm thấy Geode CLI tại: $BIN_PATH"
          chmod +x "$BIN_PATH"
          sudo mv "$BIN_PATH" /usr/local/bin/geode
          geode --version

      - name: Build mod
        run: |
          geode build --platform ios

      - name: Upload .geode artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBot-iOS.geode
          path: build/**/*.geode
